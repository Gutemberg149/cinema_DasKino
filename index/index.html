<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
      integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./styleIndex.css" />
    <title>Das Kino</title>
  </head>

  <body>
    <div id="fade" class="hide"></div>
    <header>
      <nav>
        <div class="logo">
          <p>Das</p>
          <span>Kino</span>
        </div>

        <ul>
          <li>Home</li>
          <li>Contact us</li>
          <li>Movies</li>
          <li><i class="fa-solid fa-magnifying-glass"></i></li>
          <li class="signIn_li"><a href="#">Sign in</a></li>
        </ul>
      </nav>
      <div class="bottom_header">
        <div class="bottom_header_left">
          <img src="./../images/avatarTitle.jpg" alt="" />
          <div class="bottom_header_left_bottom">
            <button class="btn_moreInfo">More info</button>
            <div class="timeTable">
              <p>January 20 2024</p>
              <p>MAX 3D</p>
            </div>
          </div>
        </div>

        <div class="bottom_header_right">
          <p>Play trailer</p>
          <div class="playTrailer"><i class="fa-solid fa-play"></i></div>
        </div>
      </div>
      <div id="modal" class="hide">
        <div class="modal_header">
          <p>Avatar The Way Of Water</p>
          <i class="fa-solid fa-x"></i>
        </div>
        <div class="video_container"></div>
      </div>
    </header>

    <main>
      <div class="topMain">
        <div class="moviesFilter">
          <span class="allMoviesSpan">ALL MOVIES</span>
          <span class="playingNowSpan">PLAYING NOW</span>
          <span class="comingSoonSpan">COMING SOON</span>
        </div>

        <div class="searchContainer">
          <div class="alertOfInputError">
            <p>ENTER A VALID TITLE</p>
          </div>
          <div class="search">
            <input type="text" maxlength="30" class="inputMovieTitle" />
            <i class="fa-solid fa-magnifying-glass"></i>
          </div>
          <div class="enter"><p>ENTER</p></div>
        </div>
      </div>
      <div class="alertOfInputError">
        <p>Enter a valid title</p>
      </div>
      <div class="lineAcross"></div>

      <div class="moviePlayinContainer">
        <!-- <div class="movieBoxContainer">
          <div class="posterContainer"></div>
          <div class="infoBox">
            <div class="title">127 hours</div>
            <div class="bottomInfo">
              <p class="duration">120 min</p>
              <div class="barDivision"></div>
              <p class="typeOfMovie">Action</p>
            </div>
          </div>
        </div> -->
      </div>
    </main>

    <footer>
      <div class="logoContainer">
        <div class="logo">
          <p>Das</p>
          <span>Kino</span>
        </div>
      </div>
      <div class="contactContainer">Contact us</div>
      <div class="SocialMediaContainer">
        <i class="fa-brands fa-square-instagram"></i>
        <i class="fa-brands fa-facebook"></i>
        <i class="fa-brands fa-linkedin"></i>
      </div>
    </footer>
    <script src="./indexJS.js" type="module"></script>
  </body>
</html>
