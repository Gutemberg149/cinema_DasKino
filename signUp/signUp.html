<!DOCTYPE html>

  <body>
    <header>

        <div class="logo">
          <p>Das</p>

        </div>

        <ul>
          <li>Home</li>

    </header>
    <div class="h1Container"><h1>Sign Up</h1></div>
    <main>
      <div class="logInContainer">
        <div class="backGroundPost"></div>

        <form action="post" method="post">
          <div class="inputBox">
            <input type="text" id="name" name="name" required="required" />

          </div>

          <div class="inputBox">
            <input
              type="text"
              id="password"
              name="password"
              required="required"
            />
            <span for="email">Email</span>
          </div>
          <div class="inputBox">
            <input
              type="text"
              id="password"
              name="password"
              required="required"
            />
            <span for="email">Password</span>
          </div>
          <div class="inputBox">
            <input
              type="text"
              id="password"
              name="password"
              required="required"
            />
            <span for="email">Confirm Password</span>
          </div>

          <div class="boxTerms">
            <div class="box"></div>
            <p>Check the box to agree with <span>terms and conditions</span></p>
          </div>

          <div class="signUp">
            <button>Sign up</button>
            <p>Click here if you dont have an account.</p>
          </div>

    <footer>

        ></a>
